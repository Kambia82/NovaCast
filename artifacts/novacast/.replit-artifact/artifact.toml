kind = "web"
previewPath = "/"
title = "Novacast — Your Fishing Mentor"
version = "1.0.0"
id = "artifacts/novacast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20642

[services.development]
run = "pnpm --filter @workspace/novacast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novacast", "run", "build" ]
publicDir = "artifacts/novacast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20642"
BASE_PATH = "/"
